<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgriChain AI — Logo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #081410;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  canvas#scene {
    position: absolute;
    inset: 0;
    display: block;
  }

  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(8,20,16,0) 0%, rgba(8,20,16,0.55) 72%, rgba(6,14,11,0.92) 100%);
  }

  .hint {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(239, 246, 238, 0.25);
    opacity: 0;
    animation: fadeHint 1s ease forwards;
    animation-delay: 2.6s;
  }

  @keyframes fadeHint {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="scene"></canvas>
  <div class="vignette"></div>
  <div class="hint">move to look around</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  var canvas = document.getElementById('scene');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x081410);
  scene.fog = new THREE.FogExp2(0x081410, 0.045);

  var camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0.6, 11);

  // ---------- lighting ----------
  var ambient = new THREE.AmbientLight(0x3a5240, 1.1);
  scene.add(ambient);

  var keyLight = new THREE.DirectionalLight(0xbfe7c4, 1.4);
  keyLight.position.set(5, 6, 6);
  scene.add(keyLight);

  var amberLight = new THREE.PointLight(0xe9b23b, 2.2, 14, 2);
  amberLight.position.set(-3, -1, 4);
  scene.add(amberLight);

  var mintLight = new THREE.PointLight(0x7ede9b, 1.6, 14, 2);
  mintLight.position.set(4, 2, 3);
  scene.add(mintLight);

  // ---------- chain group ----------
  var chainGroup = new THREE.Group();
  scene.add(chainGroup);

  var GREEN = 0x1f7a3f;
  var GREEN_LIGHT = 0x2f9b56;
  var AMBER = 0xe9b23b;
  var MINT = 0x7ede9b;

  var linkCount = 7;
  var linkRadius = 0.62;
  var linkTube = 0.15;
  var spacing = 0.92;
  var startX = -((linkCount - 1) * spacing) / 2;
  var linkMeshes = [];
  var linkAnchors = [];

  function torusMaterial(color, metalness, roughness) {
    return new THREE.MeshStandardMaterial({
      color: color,
      metalness: metalness,
      roughness: roughness,
      envMapIntensity: 1
    });
  }

  function leafShape() {
    var shape = new THREE.Shape();
    shape.moveTo(0, -0.62);
    shape.bezierCurveTo(0.55, -0.5, 0.62, 0.25, 0, 0.66);
    shape.bezierCurveTo(-0.62, 0.25, -0.55, -0.5, 0, -0.62);
    return shape;
  }

  for (var i = 0; i < linkCount; i++) {
    var x = startX + i * spacing;
    var y = Math.sin(i * 0.9) * 0.28;
    var isLeaf = i === Math.floor(linkCount / 2);
    var mesh;

    if (isLeaf) {
      var shape = leafShape();
      var extrudeSettings = { depth: 0.14, bevelEnabled: true, bevelThickness: 0.03, bevelSize: 0.03, bevelSegments: 3, curveSegments: 24 };
      var geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
      geo.center();
      mesh = new THREE.Mesh(geo, torusMaterial(MINT, 0.25, 0.35));
      mesh.rotation.y = 0.15;
      mesh.scale.setScalar(0.98);
    } else {
      var geo2 = new THREE.TorusGeometry(linkRadius, linkTube, 24, 64);
      var color = i % 2 === 0 ? GREEN : GREEN_LIGHT;
      if (i === 1 || i === linkCount - 2) color = AMBER;
      mesh = new THREE.Mesh(geo2, torusMaterial(color, 0.55, 0.32));
      mesh.rotation.y = (i % 2 === 0) ? 0 : Math.PI / 2;
    }

    mesh.position.set(x, y, 0);
    chainGroup.add(mesh);
    linkMeshes.push(mesh);
    linkAnchors.push(new THREE.Vector3(x, y, 0));
  }

  chainGroup.position.y = 0.35;

  // ---------- data-flow particle ----------
  var curvePoints = linkAnchors.map(function (p) {
    return new THREE.Vector3(p.x, p.y + 0.35, p.z + 0.05);
  });
  curvePoints.push(curvePoints[0].clone());
  var flowCurve = new THREE.CatmullRomCurve3(curvePoints, true, 'catmullrom', 0.4);

  function glowSprite(hexColor) {
    var size = 128;
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');
    var grd = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    var col = new THREE.Color(hexColor);
    var r = Math.floor(col.r * 255), g = Math.floor(col.g * 255), b = Math.floor(col.b * 255);
    grd.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',1)');
    grd.addColorStop(0.35, 'rgba(' + r + ',' + g + ',' + b + ',0.55)');
    grd.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, size, size);
    var tex = new THREE.CanvasTexture(c);
    var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    var sprite = new THREE.Sprite(mat);
    return sprite;
  }

  var particleA = glowSprite(0xe9b23b);
  particleA.scale.set(0.55, 0.55, 0.55);
  chainGroup.add(particleA);

  var particleB = glowSprite(0x7ede9b);
  particleB.scale.set(0.4, 0.4, 0.4);
  chainGroup.add(particleB);

  // ---------- ambient dust particles ----------
  var dustCount = 140;
  var dustGeo = new THREE.BufferGeometry();
  var positions = new Float32Array(dustCount * 3);
  for (var d = 0; d < dustCount; d++) {
    positions[d * 3] = (Math.random() - 0.5) * 18;
    positions[d * 3 + 1] = (Math.random() - 0.5) * 10;
    positions[d * 3 + 2] = (Math.random() - 0.5) * 10 - 2;
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  var dustMat = new THREE.PointsMaterial({
    color: 0x9fd9ae,
    size: 0.025,
    transparent: true,
    opacity: 0.45,
    depthWrite: false
  });
  var dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  // ---------- interaction (parallax) ----------
  var mouseX = 0, mouseY = 0, targetRotY = 0, targetRotX = 0;
  window.addEventListener('mousemove', function (e) {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
  });
  window.addEventListener('touchmove', function (e) {
    if (e.touches && e.touches[0]) {
      mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
      mouseY = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
    }
  }, { passive: true });

  // ---------- resize ----------
  window.addEventListener('resize', function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- animation loop ----------
  var clock = new THREE.Clock();
  var introDone = false;
  var introStart = null;

  function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    if (introStart === null) introStart = t;
    var introT = Math.min((t - introStart) / 1.4, 1);
    var ease = 1 - Math.pow(1 - introT, 3);
    chainGroup.scale.setScalar(0.4 + ease * 0.6);
    chainGroup.position.z = (1 - ease) * -4;

    targetRotY = mouseX * 0.35;
    targetRotX = mouseY * 0.15;
    chainGroup.rotation.y += (targetRotY - chainGroup.rotation.y) * 0.04;
    chainGroup.rotation.x += (-targetRotX - chainGroup.rotation.x) * 0.04;
    chainGroup.rotation.y += 0.0022;

    linkMeshes.forEach(function (m, idx) {
      m.position.y = linkAnchors[idx].y + Math.sin(t * 0.9 + idx * 0.6) * 0.03;
    });

    var flowT = (t * 0.09) % 1;
    var posA = flowCurve.getPointAt(flowT);
    particleA.position.copy(posA);

    var flowT2 = (t * 0.09 + 0.5) % 1;
    var posB = flowCurve.getPointAt(flowT2);
    particleB.position.copy(posB);

    dust.rotation.y = t * 0.01;

    amberLight.intensity = 2.0 + Math.sin(t * 1.6) * 0.4;
    mintLight.intensity = 1.5 + Math.cos(t * 1.3) * 0.3;

    camera.position.x += (mouseX * 0.6 - camera.position.x) * 0.03;
    camera.position.y += (0.6 - mouseY * 0.3 - camera.position.y) * 0.03;
    camera.lookAt(0, 0.35, 0);

    renderer.render(scene, camera);
  }

  animate();
})();
</script>

</body>
</html>
